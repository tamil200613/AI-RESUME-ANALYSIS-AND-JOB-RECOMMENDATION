{% extends 'base.html' %}
{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-8">
        <h2 class="fw-bold text-light">Post a New Job</h2>
        <p class="text-secondary">Fill in the details below to create a new job posting on your ATS.</p>
    </div>
    <div class="col-md-4 text-md-end">
        <a href="{{ url_for('recruiter.dashboard') }}" class="btn btn-outline-light">Cancel & Go Back</a>
    </div>
</div>

<div class="card shadow-sm border-0 rounded-4" style="background: #1e1e1e; border: 1px solid #333 !important;">
    <div class="card-body p-4 p-md-5">
        <form method="POST" action="{{ url_for('recruiter.post_job') }}">
            <div class="mb-4">
                <label for="title" class="form-label fw-bold text-light">Job Title</label>
                <input type="text" class="form-control form-control-lg bg-dark text-light border-secondary" id="title" name="title" required placeholder="e.g. Senior Software Engineer">
            </div>
            
            <div class="mb-4">
                <label for="description" class="form-label fw-bold text-light">Job Description</label>
                <textarea class="form-control bg-dark text-light border-secondary" id="description" name="description" rows="5" required placeholder="Describe the responsibilities and requirements of the role..."></textarea>
            </div>
            
            <div class="mb-4">
                <label for="required_skills" class="form-label fw-bold text-light">Required Skills <span class="text-muted fw-normal">(Comma-separated)</span></label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="required_skills" name="required_skills" required placeholder="Python, React, AWS, Docker">
                <div class="form-text text-secondary">These skills will be used by our AI to match candidate resumes.</div>
            </div>

            <div class="mb-5">
                <label for="deadline" class="form-label fw-bold text-light">Application Deadline</label>
                <input type="date" class="form-control bg-dark text-light border-secondary" id="deadline" name="deadline" required>
                <div class="form-text text-secondary">Candidates will not be able to apply after this date.</div>
            </div>
            
            <hr class="mb-4 border-secondary">
            
            <div class="d-flex gap-3 justify-content-end">
                <button type="reset" class="btn btn-light px-4">Clear</button>
                <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">Publish Job</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
